function buildSection(mName, mData) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = 'sec_' + mName.replace(/\s+/g,'_');

  sec.innerHTML = `
    <div class="controls">
      <div class="legend">
        <div class="leg"><div class="leg-line" style="background:#1D9E75"></div>Q4 — top 25%</div>
        <div class="leg"><div class="leg-line" style="background:#378ADD"></div>Q3</div>
        <div class="leg"><div class="leg-line" style="background:#AFA9EC"></div>Q2</div>
        <div class="leg"><div class="leg-line" style="background:#F0997B"></div>Q1 — bottom 25%</div>
      </div>
      <div class="toggle">
        <button class="tgl on" data-metric="${mName}" data-mode="free">Free y-axis</button>
        <button class="tgl" data-metric="${mName}" data-mode="fixed">Shared y-axis</button>
      </div>
    </div>
    <div class="grid" id="grid_${mName.replace(/\s+/g,'_')}"></div>
  `;
  sectionsEl.appendChild(sec);

  const grid = sec.querySelector('.grid');
  allCharts[mName] = [];

  DIVS.forEach((div, i) => {
    const cid = `c_${mName.replace(/\s+/g,'_')}_${div.k}`;
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = `
      <div class="ph">
        <div>
          <span class="badge" style="background:${div.bg};color:${div.c};">Div ${div.k}</span>
          <div class="pname">${div.name}</div>
        </div>
      </div>
      <div style="position:relative;height:155px;"><canvas id="${cid}"></canvas></div>`;
    grid.appendChild(panel);
  });

  setTimeout(() => {
    DIVS.forEach(div => {
      const cid = `c_${mName.replace(/\s+/g,'_')}_${div.k}`;
      const divData = mData.data[div.k];
      if (!divData) return;
      const datasets = ['Q4','Q3','Q2','Q1'].map(q => ({
        label: q,
        data: divData[q] || Array(24).fill(null),
        borderColor: QC[q],
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: QC[q],
        tension: 0.3,
        spanGaps: true
      }));
      const chart = new Chart(document.getElementById(cid), {
        type: 'line',
        data: { labels: YEARS, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: { padding: { top: 2 } },
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index', intersect: false,
              backgroundColor: 'rgba(20,20,20,0.88)',
              titleColor: '#fff',
              bodyColor: 'rgba(255,255,255,0.72)',
              padding: 9,
              cornerRadius: 6,
              callbacks: {
                title: i => 'Year ' + i[0].label,
                label: i => '  ' + i.dataset.label + '  ' + (i.raw !== null ? (+i.raw).toFixed(1) : '—')
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              border: { display: false },
              ticks: { maxTicksLimit: 5, font: { size: 10 }, color: '#B4B2A9', maxRotation: 0 }
            },
            y: {
              min: 0,
              max: undefined,
              grid: { color: 'rgba(180,178,169,0.12)' },
              border: { display: false },
              ticks: { maxTicksLimit: 4, font: { size: 10 }, color: '#B4B2A9' }
            }
          },
          interaction: { mode: 'index', intersect: false }
        }
      });
      allCharts[mName].push(chart);
    });
  }, 0);

  sec.querySelectorAll('.tgl').forEach(btn => {
    btn.addEventListener('click', () => {
      sec.querySelectorAll('.tgl').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      const fixed = btn.dataset.mode === 'fixed';
      allCharts[mName].forEach(ch => {
        ch.options.scales.y.max = fixed ? METRICS[mName].max : undefined;
        ch.update();
      });
    });
  });
}

function showSection(mName) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById('sec_' + mName.replace(/\s+/g,'_')).classList.add('visible');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-metric="${mName}"]`).classList.add('active');
  activeMetric = mName;
}

Object.entries(METRICS).forEach(([name, mData]) => {
  const tab = document.createElement('button');
  tab.className = 'tab';
  tab.dataset.metric = name;
  tab.textContent = name;
  tab.addEventListener('click', () => showSection(name));
  tabsEl.appendChild(tab);
  buildSection(name, mData);
});

showSection(Object.keys(METRICS)[0]);
</script>
